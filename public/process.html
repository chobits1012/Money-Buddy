<!DOCTYPE html>
<html>
<head>
    <title>Icon Processor</title>
</head>
<body>
    <h1>Icon Processor</h1>
    <canvas id="canvas"></canvas>
    <script>
        async function processImage(url, filename) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    const canvas = document.getElementById('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imgData.data;

                    // 1. Find Bounding Box
                    let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;
                    for (let y = 0; y < canvas.height; y++) {
                        for (let x = 0; x < canvas.width; x++) {
                            const index = (y * canvas.width + x) * 4;
                            const r = data[index];
                            const g = data[index + 1];
                            const b = data[index + 2];
                            const a = data[index + 3];

                            // Skip white-ish backgrounds
                            if (a > 10 && !(r > 240 && g > 240 && b > 240)) {
                                if (x < minX) minX = x;
                                if (x > maxX) maxX = x;
                                if (y < minY) minY = y;
                                if (y > maxY) maxY = y;
                            }
                        }
                    }

                    const cropW = maxX - minX + 1;
                    const cropH = maxY - minY + 1;
                    const maxDim = Math.max(cropW, cropH);

                    // 2. Center in a square canvas of the original size or a scaled size
                    canvas.width = canvas.height = img.width; // Maintain output size (e.g. 192 or 512)
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    // Calculate scale to fit the crop into the new canvas while maintaining some padding
                    const scale = (canvas.width * 0.95) / maxDim; // 5% padding
                    const finalW = cropW * scale;
                    const finalH = cropH * scale;

                    const dx = (canvas.width - finalW) / 2;
                    const dy = (canvas.height - finalH) / 2;

                    // Apply filters before drawing the cropped portion
                    ctx.filter = 'saturate(0.5) sepia(0.3) contrast(0.85)';
                    ctx.drawImage(img, minX, minY, cropW, cropH, dx, dy, finalW, finalH);
                    ctx.filter = 'none';

                    // Download the result
                    canvas.toBlob((blob) => {
                        const link = document.createElement('a');
                        link.download = filename;
                        link.href = URL.createObjectURL(blob);
                        link.click();
                        resolve();
                    }, 'image/png');
                };
                img.src = url;
            });
        }

        async function run() {
            // Modify this to point correctly depending on how this connects
            await processImage('/pwa-192x192.png', 'pwa-192x192-processed.png');
            await processImage('/pwa-512x512.png', 'pwa-512x512-processed.png');
            document.body.innerHTML += '<p>Done!</p>';
        }

        run();
    </script>
</body>
</html>
